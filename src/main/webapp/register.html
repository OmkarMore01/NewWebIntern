<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Laptop Shop - Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body {
        background: linear-gradient(120deg, #1e3c72, #2a5298);
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        width:100%;
        font-family: 'Segoe UI', sans-serif;
    }

    .register-card {
        background: #ffffff;
        border-radius: 15px;
        padding: 35px;
        width: 200%;
       
        box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        animation: fadeIn 0.6s ease-in-out;
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .logo {
        text-align: center;
        font-size: 30px;
        font-weight: bold;
        color: #2a5298;
        margin-bottom: 5px;
    }

    .logo span {
        color: #00c6ff;
    }

    .title {
        text-align: center;
        margin-bottom: 25px;
        color: #444;
        font-weight: 600;
    }

    .form-label {
        font-weight: 500;
        color: #555;
    }

    .form-control {
        border-radius: 8px;
        padding: 10px;
        transition: 0.3s;
    }

    .form-control:focus {
        border-color: #2a5298;
        box-shadow: 0 0 5px rgba(42,82,152,0.3);
    }

    .btn-register {
        background: #2a5298;
        color: white;
        border-radius: 8px;
        padding: 10px;
        font-weight: 500;
        transition: 0.3s;
    }

    .btn-register:hover {
        background: #1e3c72;
    }

    .btn-cancel {
        border-radius: 8px;
    }

</style>

</head>
<body>

<form action="UserRegisterServlet" method="post">
    <div class="register-card">

        <div class="logo">💻 Laptop<span>Shop</span></div>
        <h5 class="title">Create New Account</h5>

        <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" name="name" class="form-control" placeholder="Enter your full name" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Email Address</label>
            <input type="email" name="email" class="form-control" placeholder="Enter email" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Contact Number</label>
            <input type="tel" name="contact" maxlength="10" min="10" class="form-control" placeholder="Enter contact number" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" name="uname" class="form-control" placeholder="Choose username" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="pass" class="form-control" placeholder="Create password" required>
        </div>

        <div class="d-grid gap-2 mt-3">
            <button type="submit" class="btn btn-register">Register</button>
            <button type="reset" class="btn btn-outline-secondary btn-cancel">Cancel</button>
        </div>

    </div>
</form>

</body>
</html>
